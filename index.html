<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="shortcut icon" href="./math-calculator.png" type="image/x-png">
    <style>
       *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-size: large;
}

body{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-image: radial-gradient(pink,#b784e7,#C350E5);
    padding: 15px;
}

.container{
    width: 100%;
    max-width: 380px;
    background-image: linear-gradient(40deg,#EB59AC 20%,#59ACEB,#59EBA4);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 5px 10px rgb(66, 13, 180);
}

.inp{
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 15px;
    margin-bottom: 15px;
    text-align: right;
    font-size: 20px;
    font-weight: bold;
    min-width: 0;
}

.btn{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 100%;
}

button{
    width: 100%;
    aspect-ratio: 1;
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 900;
    font-size: clamp(18px, 4vw, 32px);
    background-image: conic-gradient(#BBC2FC,#6374F8,#273FF5,#0B27F4,#07199C,#051270);
    user-select: none;
    cursor: pointer;
    transition: 0.2s;
}

button:hover{
    transform: scale(1.05);
}
    </style>
</head>
<body>
    <div class="container">

        <input type="text" class="inp" readonly>

        <div class="btn">


            <button>(</button>
            <button>)</button>
            <button>C</button>
            <button>⌫</button>    

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>÷</button>
            
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>×</button>
            
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>–</button>
            
            <button>0</button>
            <button>.</button>
            <button>=</button>
            <button>+</button>
        </div>
    </div>
    <script src="./4_calculator.js"></script>
</body>
</html>
